<!DOCTYPE html>
<html lang="en">
<head>

<title>Credify Verify | Result</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<script>
tailwind.config = {
darkMode: "class",
theme: {
extend: {
colors: {

"background-light": "#f5f7f8",
"background-dark": "#0f1723",
},
fontFamily: {
"display": ["Inter", "sans-serif"],
"satoshi": ["Inter", "sans-serif"]
},
borderRadius: {
"DEFAULT": "0.25rem",

"full": "9999px"
},

}

<style>
body{
font-family:'Inter',sans-serif;

<body class="bg-background-light dark:bg-background-dark min-h-screen p-4 sm:p-6" data-page="result">

<main class="mx-auto w-full max-w-[1040px]">

<script src="https://unpkg.com/@zxing/library@latest"></script>
