<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

<script id="tailwind-config">
tailwind.config = {
darkMode: "class",
theme: {
extend: {
colors: {
"primary": "#0066ff",
"background-light": "#f5f7f8",
"background-dark": "#0f1723",
},
fontFamily: {
"display": ["Inter", "sans-serif"],
"satoshi": ["Inter", "sans-serif"]
},
borderRadius: {
"DEFAULT": "0.25rem",
"lg": "0.5rem",
"xl": "0.75rem",
"full": "9999px"
},
},
},
}
</script>

<style>
body{
font-family:'Inter',sans-serif;
}
</style>
</head>

<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col items-center justify-center p-4">

<div class="w-full max-w-[560px] flex flex-col items-center">

<!-- Header Section -->

<header class="w-full flex flex-col items-center mb-10">

<div class="flex items-center gap-2 mb-8">

<div class="bg-primary p-1.5 rounded-lg">

<svg class="size-6 text-white" fill="none" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">

<path d="M4 42.4379C4 42.4379 14.0962 36.0744 24 41.1692C35.0664 46.8624 44 42.2078 44 42.2078L44 7.01134C44 7.01134 35.068 11.6577 24.0031 5.96913C14.0971 0.876274 4 7.27094 4 7.27094L4 42.4379Z" fill="currentColor"></path>

</svg>

</div>

<span class="text-slate-900 dark:text-slate-100 text-xl font-bold tracking-tight">
Credify
</span>

</div>

<div class="inline-flex items-center px-3 py-1 rounded-full bg-primary/10 border border-primary/20 mb-4">

<span class="text-[10px] font-bold tracking-[0.05em] text-primary uppercase">
Official Credify Verification Portal
</span>

</div>

<h1 class="text-slate-900 dark:text-slate-100 text-[32px] font-bold leading-tight text-center mb-2">
Verify an academic credential instantly
</h1>

</header>

<!-- Method Grid -->

<main class="w-full space-y-3 mb-8">

<!-- Method 1 -->

<button onclick="window.location.href='scan.html'" class="w-full group flex items-center justify-between p-5 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg hover:border-primary transition-colors text-left">

<div class="flex items-center gap-4">

<div class="size-12 rounded-lg bg-slate-50 dark:bg-slate-900 flex items-center justify-center text-slate-600 dark:text-slate-400 group-hover:text-primary transition-colors">

<span class="material-symbols-outlined text-2xl">
qr_code_scanner
</span>

</div>

<div>

<h3 class="text-slate-900 dark:text-slate-100 font-semibold text-base">
Scan QR Code
</h3>

<p class="text-slate-500 dark:text-slate-400 text-sm">
Use your device camera to verify instantly
</p>

</div>

</div>

<span class="material-symbols-outlined text-slate-400 group-hover:text-primary transition-colors">
chevron_right
</span>

</button>

<!-- Method 2 -->

<button onclick="window.location.href='upload.html'" class="w-full group flex items-center justify-between p-5 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg hover:border-primary transition-colors text-left">

<div class="flex items-center gap-4">

<div class="size-12 rounded-lg bg-slate-50 dark:bg-slate-900 flex items-center justify-center text-slate-600 dark:text-slate-400 group-hover:text-primary transition-colors">

<span class="material-symbols-outlined text-2xl">
upload_file
</span>

</div>

<div>

<h3 class="text-slate-900 dark:text-slate-100 font-semibold text-base">
Upload Digital Diploma
</h3>

<p class="text-slate-500 dark:text-slate-400 text-sm">
PDF, JSON-LD, or W3C Verifiable Credentials
</p>

</div>

</div>

<span class="material-symbols-outlined text-slate-400 group-hover:text-primary transition-colors">
chevron_right
</span>

</button>

<!-- Method 3 -->

<button onclick="window.location.href='link.html'" class="w-full group flex items-center justify-between p-5 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg hover:border-primary transition-colors text-left">

<div class="flex items-center gap-4">

<div class="size-12 rounded-lg bg-slate-50 dark:bg-slate-900 flex items-center justify-center text-slate-600 dark:text-slate-400 group-hover:text-primary transition-colors">

<span class="material-symbols-outlined text-2xl">
link
</span>

</div>

<div>

<h3 class="text-slate-900 dark:text-slate-100 font-semibold text-base">
Verify via Link
</h3>

<p class="text-slate-500 dark:text-slate-400 text-sm">
Enter a verification URL or hash code
</p>

</div>

</div>

<span class="material-symbols-outlined text-slate-400 group-hover:text-primary transition-colors">
chevron_right
</span>

</button>

</main>

<!-- Footer -->

<footer class="text-center">

<p class="text-slate-500 dark:text-slate-400 text-[13px] font-medium leading-relaxed">
No login required • Verification runs locally in your browser
</p>

<div class="mt-8 flex items-center justify-center gap-6">

<a class="text-[12px] text-slate-400 hover:text-primary transition-colors" href="#">
Privacy Policy
</a>

<a class="text-[12px] text-slate-400 hover:text-primary transition-colors" href="#">
Trust Framework
</a>

<a class="text-[12px] text-slate-400 hover:text-primary transition-colors" href="#">
Support
</a>

</div>

</footer>

</div>

</body>
</html>
